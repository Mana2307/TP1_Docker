name: Tests Unitaires - CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    name: Exécution des tests unitaires
    
    steps:
    - name: 📥 Récupérer le code
      uses: actions/checkout@v3
    
    - name: ☕ Configurer Java 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: 🧪 Exécuter les tests
      run: |
        chmod +x mvnw
        ./mvnw clean test
    
    - name: 📊 Publier les résultats des tests
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: target/surefire-reports/*.xml
        check_name: Résultats des tests
    
    - name: ✅ Vérifier le succès
      if: success()
      run: echo "✅ Tous les tests ont réussi!"
    
    - name: ❌ Signaler les échecs
      if: failure()
      run: echo "❌ Des tests ont échoué, consultez les rapports" && exit 1
